<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup form</title>
    <link rel="stylesheet" href="log.css">
</head>
<body>
    <form >
        <h1 class="h1" style="color: goldenrod">Sign Up form</h1><br><br><br>
        <label for="Name"> Your Name</label> <br>
        <input type="text" id="name" name="name" placeholder="Enter Full name"><br>

        <label for="email">Your email</label> <br>
        <input type="text" id="email" name="email" placeholder="Email" required><br>

        <label for="age">Your Age</label><br>
        <p>Enter Age Range</p><br>
         <select>
                        <option value="">0-20</option>
                        <option value="">21-40</option>
                        <option value="">41-60</option>
                    </select><br><br>

        <label for="occupation">Your occupation</label><br>
        <input type="text" id="occupation" name="occupation"><br>

        <label for="Experience">Your Experience level</label><br>
         <select>
                        <option value="">Entry level</option>
                        <option value="">Middle level</option>
                        <option value="">senior level</option>
                    </select><br><br>

                    <label for="Education level">Your Education level</label><br>
                    <select>
                        <option value="">Hgh school certificate</option>
                        <option value="">Bachelors Degree</option>
                        <option value="">Masters certificate</option>
                        <option value="">Diplomacy Degree</option>

                    </select><br><br>

        <label for="About You">About You</label><br>
        <textarea name="About You" id="About You" rows="5" placeholder="Tell us About
        yourself......."></textarea><br><br>
        <p class="Papa">I agree to all Terms and conditions To this signup</p> <br>

        <input type="checkbox" required>
        
        <button type="submit">Submit here</button>


       

    </form>
</body>
</html>
