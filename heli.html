<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plane Takeoff Animation</title>
  <style>
    
    body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb; 
    }

    
    .runway {
      width: 100%;
      height: 100vh;
      background: url(media/runway.png) no-repeat center/cover;
      position: relative;
      background-position: end;
    }

    
    .plane {
      position: absolute;
      bottom: -100px;  
      left: -150px;    
      width: 700px;

      animation: takeoff 6s ease-in-out infinite;
      background-color: transparent;
    }

    
    @keyframes takeoff {
      0% {
      
        transform: rotate(0deg);
      }
      50% {
        
        /* transform: translate(1800px,-200px); */
        bottom: 300px;
      }
      100% {
      
        transform:rotate(-10deg);
        left: 100%;
        bottom: 500px;
        
      }
      /* 80% {
       
        transform: translate(600px, -700px); */
      }
    
  </style>
</head>
<body>
  <div class="runway">
    <div class="plane">

        <img src="media/planee-removebg-preview.png"  alt="Plane">
    </div>
  </div>
</body>
</html>
