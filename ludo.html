<!DOCTYPE html>
<html>
<head>
    <title> Ludo Board</title>
    <style>
        table {
            border-collapse: collapse;
            margin: auto;
        }
        td {
            width: 32px;
            height: 32px;
            border: 1px solid black;
        }

        .red { background: #e11d48; }
        .blue { background: #2563eb; }
        .green { background: #16a34a; }
        .yellow { background: #facc15; }
        .white { background: white; }
    </style>
</head>
<body>

<table>

<!-- ROW 1 -->
<tr>
<td class="red" colspan="6" rowspan="6"></td>
<td class="white"></td><td class="white"></td><td class="white"></td>
<td class="blue" colspan="6" rowspan="6"></td>
</tr>

<!-- ROW 2 -->
<tr>
<td class="white"></td><td class="blue"></td><td class="white"></td>
</tr>

<!-- ROW 3 -->
<tr>
<td class="white"></td><td class="blue"></td><td class="white"></td>
</tr>

<!-- ROW 4 -->
<tr>
<td class="white"></td><td class="blue"></td><td class="white"></td>
</tr>

<!-- ROW 5 -->
<tr>
<td class="white"></td><td class="blue"></td><td class="white"></td>
</tr>

<!-- ROW 6 -->
<tr>
<td class="white"></td><td class="blue"></td><td class="white"></td>
</tr>

<!-- ROW 7 -->
<tr>
<td class="white"></td>
<td class="red"></td><td class="red"></td><td class="red"></td><td class="red"></td><td class="red"></td>
<td class="red"></td>
<td class="blue"></td><td class="blue"></td><td class="blue"></td><td class="blue"></td><td class="blue"></td>
<td class="white"></td>
</tr>

<!-- ROW 8 (CENTER CROSS) -->
<tr>
<td class="white"></td>
<td class="white"></td><td class="white"></td><td class="white"></td><td class="white"></td>
<td class="red"></td>
<td class="green"></td>
<td class="blue"></td>
<td class="yellow"></td>
<td class="white"></td><td class="white"></td><td class="white"></td>
<td class="white"></td>
</tr>

<!-- ROW 9 -->
<tr>
<td class="white"></td>
<td class="green"></td><td class="green"></td><td class="green"></td><td class="green"></td><td class="green"></td>
<td class="green"></td>
<td class="yellow"></td><td class="yellow"></td><td class="yellow"></td><td class="yellow"></td><td class="yellow"></td>
<td class="white"></td>
</tr>

<!-- ROW 10 -->
<tr>
<td class="green" colspan="6" rowspan="6"></td>
<td class="white"></td><td class="white"></td><td class="white"></td>
<td class="yellow" colspan="6" rowspan="6"></td>
</tr>

<!-- ROW 11 -->
<tr>
<td class="white"></td><td class="green"></td><td class="white"></td>
</tr>

<!-- ROW 12 -->
<tr>
<td class="white"></td><td class="green"></td><td class="white"></td>
</tr>

<!-- ROW 13 -->
<tr>
<td class="white"></td><td class="green"></td><td class="white"></td>
</tr>

<!-- ROW 14 -->
<tr>
<td class="white"></td><td class="green"></td><td class="white"></td>
</tr>

<!-- ROW 15 -->
<tr>
<td class="white"></td><td class="green"></td><td class="white"></td>
</tr>

</table>

</body>
</html>
