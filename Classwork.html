<!DOCTYPE html>
<html>
<head>
    <title>Seminar Schedule</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #181818;
            padding: 10px;
            text-align: center;
        }
        .header-row {
            background-color: #87CEFA;
        }
        .data-row {
            background-color: #FF9999;
        }
    </style>
</head>
<body>
    <table>
        <!-- Header Row 1 -->
        <tr class="header-row">
            <th rowspan="3">DAY</th>
            <th colspan="3">SEMINAR</th>
        </tr>
        
        <!-- Header Row 2 -->
        <tr class="header-row">
            <!-- <th></th> -->
            <th colspan="2">SCHEDULE</th>
            <th rowspan="2">TOPIC</th>
        </tr>
        
        <!-- Header Row 3 -->
        <tr class="header-row">
            <!-- <th></th> -->
            <th>BEGIN</th>
            <th>END</th>
            <!-- <th></th> -->
        </tr>
        
        <!-- Monday Row -->
        <tr class="data-row">
            <td>Monday</td>
            <td>8.00 a.m</td>
            <td>5.00 p.m</td>
            <td>Introduction to XML</td>
        </tr>
        
        <!-- Tuesday Rows (3 rows with rowspan) -->
        <tr class="data-row">
            <td rowspan="3">Tuesday</td>
            <td>8.00 a.m</td>
            <td>11.00 p.m</td>
            <td rowspan="3">Xpath</td>
        </tr>
        <tr class="data-row">
            <td>11.00 a.m</td>
            <td>2.00 p.m</td>
        </tr>
        <tr class="data-row">
            <td>2.00 p.m</td>
            <td>5.00 p.m</td>
        </tr>
        
        <!-- Wednesday Row -->
        <tr class="data-row">
            <td>Wednesday</td>
            <td>8.00 a.m</td>
            <td>12.00 p.m</td>
            <td>XSL Formatting Objects</td>
        </tr>
    </table>
</body>
</html>
