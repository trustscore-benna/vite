<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Identity</title>
    <link rel="stylesheet" href="log.css">
</head>
<body>
    <form>
        <label for="Firstname">Firstname</label><br>
        <input type="text" placeholder="Enter Firstname " required><br><br>

        <label for="Last-name">Last-name</label><br>
        <input type="text" placeholder="Enter Lastname"><br><br>

        <label for="Middle name">Middle name</label><br>
        <input type="text" placeholder="Enter Middle name (Optional)"><br><br>

    <label for="Date of Birth">Date of Birth</label><br>
    <input type="text" placeholder="DD/MM/YEAR" required><br><br>

    <label for="Age">AGE</label><br>
    <input type="number" placeholder="Enter Age" required><br><br>

    <label for="Occupation">Occupation</label><br>
    <input type="text" placeholder="Enter Occupation" required><br><br>

    <label for="Marital status">Maritial status</label><br>
    <input type="text" placeholder="1=single, 2=Married, 3=Divorced"><br><br>

    <label for="Phone number">Phone number</label><br>
    <input type="tel" placeholder="Enter Mobile Number" required><br><br>

    <label for="Identity Number">Identity Number</label><br>
    <input type="Number" placeholder="Enter Your ID Number" required><br><br>

    <label for="Country of Birth">Country Of Birth</label><br>
    <input type="text" placeholder="Enter Birth Country" required><br><br>

    <input type="checkbox" required>

    <P class="plane">I agree to all terms and conditions and to the submission of my personal and private information and believe my information is being entrusted with my submission.</P><br><br><br><br>

    <button>Submit Here!</button>
    </form>
</body>
</html>
